<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BennettG-08</title>

<style>

body{
background: linear-gradient(-45deg,#000000,#0f2027,#000000,#1c1c1c);
background-size:400% 400%;
animation:fondo 10s ease infinite;
font-family:Arial;
text-align:center;
color:white;
margin:0;
padding:0;
}

@keyframes fondo{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.profile{
margin-top:60px;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0; transform:translateY(-30px);}
to{opacity:1; transform:translateY(0);}
}

.profile img{
width:130px;
height:130px;
border-radius:50%;
border:3px solid #00ffcc;
box-shadow:0 0 25px #00ffcc;
transition:0.4s;
}

.profile img:hover{
transform:scale(1.1);
box-shadow:0 0 40px #00ffcc;
}

h1{
margin-top:10px;
font-size:28px;
letter-spacing:2px;
}

.button{
display:block;
width:80%;
max-width:300px;
margin:18px auto;
padding:15px;
background:transparent;
border:2px solid #00ffcc;
color:#00ffcc;
text-decoration:none;
border-radius:12px;
font-size:18px;
transition:0.3s;
animation:slide 1s;
}

@keyframes slide{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

.button:hover{
background:#00ffcc;
color:black;
transform:scale(1.05);
box-shadow:0 0 25px #00ffcc;
}

.footer{
margin-top:40px;
font-size:14px;
color:gray;
}

</style>

</head>

<body>

<div class="profile">

<img src="perfil.jpg" alt="Perfil">

<h1>@BennettG-08</h1>

</div>

<a class="button" href="https://www.instagram.com/bk.ls08">Instagram principal</a>

<a class="button" href="https://www.instagram.com/k__ybe">Instagram secundario</a>

<div class="footer">
Página oficial BennettG-08
</div>

</body>
</html>
